# Гиперпараметры обучения + эвалюации

env:
  id: MiniGrid-Empty-8x8-v0
  img_size: 64
  num_actions: 3    # left, right, forward

world_model:
  embed_dim: 256
  deter_dim: 128
  stoch_dim: 16
  hidden_dim: 128
  kl_free_bits: 1.0
  kl_scale: 1.0

training:
  num_random_episodes: 200
  num_updates: 2000
  batch_size: 16
  seq_len: 20
  lr: 3.0e-4
  log_every: 50

planner:
  horizon: 12
  num_sequences: 128
  # `random_shooting` — без дополнительных гиперпараметров. Для CEM: elite_frac, num_iters.

vlm:
  model_name: ViT-B-32
  pretrained: openai
  # Промпты оставлены на английском: OpenAI-чекпойнт CLIP обучен почти
  # исключительно на англоязычных подписях — русские промпты дают почти нулевой сигнал.
  goal_prompt: "a red triangle agent standing on the green goal square"
  negative_prompt: "a red triangle agent far from the green goal square"
  discount: 0.9

eval:
  num_episodes: 20
  seeds: [0, 1, 2]
  max_steps: 60
